tools:
  - name: git
    description: Git command wrapper
    inputSchema:
      type: object
      required:
        - command
      properties:
        command:
          type: string
    outputSchema:
      type: object
      required:
        - exitCode
      properties:
        exitCode:
          type: integer
    errorSchema:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    policy:
      timeoutMs: 60000
      retry:
        maxAttempts: 1
        backoff: none
        idempotent: false
  - name: npm
    inputSchema:
      type: object
      required:
        - script
      properties:
        script:
          type: string
    outputSchema:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
    errorSchema:
      type: object
      required:
        - code
      properties:
        code:
          type: integer
    policy:
      timeoutMs: 120000
      retry:
        maxAttempts: 1
        backoff: none
        idempotent: true
